<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-991EX Scientific Calculator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root {
            --body-bg: #1a1a1b;
            --screen-bg: #98af92;
            --btn-dark: #333333;
            --btn-light: #ececec;
            --btn-action: #2e86c1;
            --btn-clear: #c0392b;
            --accent-gold: #d4af37;
        }

        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .calculator {
            width: 360px;
            background: var(--body-bg);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            border: 2px solid #444;
        }

        .screen {
            background-color: var(--screen-bg);
            height: 110px;
            margin-bottom: 25px;
            border-radius: 8px;
            border: 4px solid #222;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-align: right;
        }

        #history { font-size: 0.9rem; color: #444; height: 20px; }
        #display { font-size: 1.8rem; font-weight: bold; color: #111; }

        .keypad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            padding: 12px 0;
            font-size: 0.85rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        button:active, .key-active { transform: scale(0.95); background: #777 !important; }

        .sci-btn { background: var(--btn-dark); color: white; }
        .num-btn { background: var(--btn-light); color: black; font-size: 1.1rem; }
        .op-btn { background: var(--btn-light); color: black; font-size: 1.1rem; }
        .action-btn { background: var(--btn-action); color: white; }
        .clear-btn { background: var(--btn-clear); color: white; }
    </style>
</head>
<body>

<div class="calculator">
    <div class="screen">
        <div id="history"></div>
        <div id="display">0</div>
    </div>

    <div class="keypad">
        <button class="sci-btn" onclick="input('sin(')">sin</button>
        <button class="sci-btn" onclick="input('cos(')">cos</button>
        <button class="sci-btn" onclick="input('tan(')">tan</button>
        <button class="sci-btn" onclick="input('^')">xⁿ</button>
        <button class="sci-btn" onclick="input('sqrt(')">√</button>

        <button class="sci-btn" onclick="input('log(')">log</button>
        <button class="sci-btn" onclick="input('ln(')">ln</button>
        <button class="sci-btn" onclick="input('(')">(</button>
        <button class="sci-btn" onclick="input(')')">)</button>
        <button class="sci-btn" onclick="input('abs(')">Abs</button>

        <button class="num-btn" id="key-7" onclick="input('7')">7</button>
        <button class="num-btn" id="key-8" onclick="input('8')">8</button>
        <button class="num-btn" id="key-9" onclick="input('9')">9</button>
        <button class="clear-btn" onclick="backspace()">DEL</button>
        <button class="clear-btn" onclick="allClear()">AC</button>

        <button class="num-btn" id="key-4" onclick="input('4')">4</button>
        <button class="num-btn" id="key-5" onclick="input('5')">5</button>
        <button class="num-btn" id="key-6" onclick="input('6')">6</button>
        <button class="op-btn" onclick="input('*')">×</button>
        <button class="op-btn" onclick="input('/')">÷</button>

        <button class="num-btn" id="key-1" onclick="input('1')">1</button>
        <button class="num-btn" id="key-2" onclick="input('2')">2</button>
        <button class="num-btn" id="key-3" onclick="input('3')">3</button>
        <button class="op-btn" onclick="input('+')">+</button>
        <button class="op-btn" onclick="input('-')">−</button>

        <button class="num-btn" id="key-0" onclick="input('0')">0</button>
        <button class="num-btn" onclick="input('.')">.</button>
        <button class="num-btn" onclick="input('pi')">π</button>
        <button class="num-btn" onclick="input('ans')">Ans</button>
        <button class="action-btn" onclick="calculate()">=</button>
    </div>
</div>

<script>
    let currentExpression = "";
    let lastResult = "0";

    const display = document.getElementById('display');
    const history = document.getElementById('history');

    function input(val) {
        if (val === 'ans') {
            currentExpression += lastResult;
        } else {
            currentExpression += val;
        }
        updateDisplay();
    }

    function calculate() {
        try {
            if (!currentExpression) return;
            const result = math.evaluate(currentExpression);
            history.innerText = currentExpression + " =";
            lastResult = math.format(result, { precision: 10 });
            currentExpression = lastResult.toString();
            updateDisplay();
        } catch (error) {
            display.innerText = "Syntax ERROR";
            currentExpression = "";
        }
    }

    function updateDisplay() {
        display.innerText = currentExpression || "0";
    }

    function allClear() {
        currentExpression = "";
        history.innerText = "";
        updateDisplay();
    }

    function backspace() {
        currentExpression = currentExpression.slice(0, -1);
        updateDisplay();
    }

    document.addEventListener('keydown', (event) => {
        const key = event.key;
        
        // Match numbers and basic operators
        if ('0123456789.+-*/()'.includes(key)) {
            input(key);
        } 
        // Match special keys
        else if (key === 'Enter') {
            event.preventDefault(); // Prevent accidental form submission
            calculate();
        } 
        else if (key === 'Backspace') {
            backspace();
        } 
        else if (key === 'Escape') {
            allClear();
        }
    });
</script>

</body>
</html>
